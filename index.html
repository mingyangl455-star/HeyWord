<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Hey Word</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=42">
</head>
<body>
  <div id="app">
    <!-- 开始界面 -->
    <div id="start-screen">
      <div class="start-inner">
        <div class="start-mascot-area" aria-hidden="true">
          <div class="mascot-glow-ring"></div>
          <div class="mascot-glow-ring mascot-glow-ring--delay"></div>
          <img src="assets/mascot.png" alt="" class="mascot-img" width="150" height="150">
        </div>
        <h1 class="start-title">Hey Word</h1>
        <p class="start-tagline">连线拼词，点亮灵感</p>

        <div class="start-actions">
          <button type="button" id="btn-start-game" class="btn-start-game">
            <span id="btn-start-label">开始游戏</span>
            <span id="btn-start-level" class="btn-start-level hidden"></span>
          </button>
          <button type="button" id="btn-new-game" class="btn-new-game hidden">
            新游戏
          </button>
        </div>

        <!-- 新游戏确认（须高于 start-screen，避免 WebView 里 confirm 无响应） -->
        <div id="new-game-confirm" class="confirm-overlay confirm-overlay--front" role="dialog" aria-modal="true" aria-labelledby="new-game-confirm-title">
          <div class="confirm-card">
            <h3 id="new-game-confirm-title">重新开始？</h3>
            <p class="confirm-desc">将从第 1 关开始练习。已闯过的进度会保留，之后仍可「继续旅途」。</p>
            <div class="confirm-actions">
              <button type="button" id="btn-new-game-cancel" class="btn-confirm-cancel">取消</button>
              <button type="button" id="btn-new-game-ok" class="btn-confirm-ok">开始新游戏</button>
            </div>
          </div>
        </div>

        <section class="friend-leaderboard" aria-label="好友排行">
          <h2 class="lb-heading">
            <span>好友排行</span>
            <span class="lb-sub">累计通关</span>
          </h2>
          <ol id="leaderboard-list" class="lb-list"></ol>
        </section>
      </div>
    </div>

    <!-- 顶部状态栏（ZenWord 风格） -->
    <header id="header">
      <div class="header-side header-side--left">
        <div class="settings-wrap">
          <button type="button" id="btn-settings" class="header-icon-btn" aria-label="设置" aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
          </button>
          <div id="settings-menu" class="settings-menu hidden" role="menu" aria-label="设置菜单">
            <button type="button" id="btn-home" class="settings-menu-item" role="menuitem">返回主页</button>
            <button type="button" id="btn-mute" class="settings-menu-item settings-menu-item--mute" role="menuitem" aria-label="音效开关">
              <span class="settings-mute-icons" aria-hidden="true">
                <svg id="mute-icon-on" viewBox="0 0 24 24" width="18" height="18">
                  <path fill="currentColor" d="M3 9v6h4l7 7V3L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <svg id="mute-icon-off" class="hidden" viewBox="0 0 24 24" width="18" height="18">
                  <path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.52 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l7 7v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 7.09 12 9.18V4z"/>
                </svg>
              </span>
              <span id="settings-mute-label">音效：开</span>
            </button>
          </div>
        </div>
        <button type="button" id="btn-dictionary" class="header-icon-btn" aria-label="词典">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M12 4.2 5 7.2v11.1l7 2.7 7-2.7V7.2l-7-3zm0 2.3 5 1.9v8.2l-5 1.9-5-1.9V8.4l5-1.9z"/>
          </svg>
        </button>
      </div>
      <div class="header-center">
        <span id="level-label">LEVEL 1</span>
        <span id="station-badge-header" class="station-badge-header">🇬🇧 伦敦站</span>
      </div>
      <div class="header-side header-side--right">
        <div class="coin-pill" aria-label="星星数量">
          <span id="coin-count">10</span>
          <span class="coin-icon" aria-hidden="true">★</span>
        </div>
      </div>
    </header>

    <!-- 字谜网格区（独立滚动/布局） -->
    <main id="grid-area">
      <div class="grid-scroll">
        <div id="grid-fit">
          <div id="grid-container"></div>
        </div>
      </div>
    </main>

    <!-- 预览条（固定占位，不影响网格与圆盘） -->
    <section id="preview-area" aria-live="polite">
      <div id="preview-box"></div>
    </section>

    <!-- 字母圆盘区（独立背景与交互） -->
    <section id="wheel-area" aria-label="字母连线">
      <div class="wheel-row">
        <div class="wheel-side-col wheel-side-col--left">
          <button type="button" id="btn-shuffle" class="wheel-action-btn" aria-label="打乱字母">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M7 7h2.6l1.85 1.85-1.4 1.4L7 7zm10 0h-2.6l-2.1 2.1 1.4 1.4L15.4 9H17v2l3-3-3-3v2zM7 17h2.6l2.1-2.1-1.4-1.4L8.6 15H7v-2l-3 3 3 3v-2zm10 0h-2.6l-1.85-1.85 1.4-1.4L17 17z"/>
            </svg>
            <span class="wheel-action-label">Shuffle</span>
          </button>
        </div>
        <div class="wheel-canvas-wrap">
          <canvas id="wheel-canvas"></canvas>
        </div>
        <div class="wheel-side-col wheel-side-col--right">
          <button type="button" id="btn-hint" class="wheel-action-btn wheel-action-btn--hint" aria-label="提示">
            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path fill="currentColor" d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/>
            </svg>
            <span class="wheel-action-label">Hint</span>
            <span class="hint-cost-badge">5★</span>
          </button>
        </div>
      </div>
    </section>

    <!-- 已解单词词典（本关） -->
    <div id="dict-modal" class="dict-overlay" role="dialog" aria-modal="true" aria-labelledby="dict-modal-title">
      <div class="dict-sheet">
        <div class="dict-sheet-header">
          <h3 id="dict-modal-title">已学单词</h3>
          <button type="button" id="btn-dict-close" class="dict-close" aria-label="关闭">×</button>
        </div>
        <div id="dict-word-list" class="dict-word-list"></div>
      </div>
    </div>

    <!-- 通关结算面板 -->
    <div id="level-cleared">
      <div class="cleared-content">
        <div class="cleared-scroll">
          <div id="stage-badge" class="stage-badge hidden"></div>
          <h2>Level Cleared</h2>
          <div id="word-cards"></div>
        </div>
        <div class="cleared-footer">
          <button type="button" id="btn-next-level">Next</button>
        </div>
      </div>
    </div>

    <!-- 返回主页确认 -->
    <div id="home-confirm" class="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="home-confirm-title">
      <div class="confirm-card">
        <h3 id="home-confirm-title">返回主页？</h3>
        <p class="confirm-desc">本关进度将不会保存，已闯过的关卡会保留。</p>
        <div class="confirm-actions">
          <button type="button" id="btn-home-cancel" class="btn-confirm-cancel">取消</button>
          <button type="button" id="btn-home-ok" class="btn-confirm-ok">返回主页</button>
        </div>
      </div>
    </div>

    <!-- 虚拟广告（星星不足时） -->
    <div id="ad-hint-modal" class="ad-overlay" role="dialog" aria-modal="true" aria-labelledby="ad-hint-title">
      <div class="ad-card">
        <p class="ad-tag">广告</p>
        <div class="ad-preview" aria-hidden="true">
          <span class="ad-brand">HelloTalk</span>
          <span class="ad-slogan">学语言，交全球好友</span>
        </div>
        <h3 id="ad-hint-title">观看广告获得 1 次提示</h3>
        <p class="ad-desc">星星数量不变，看完后立刻为你揭示一格</p>
        <div class="ad-progress-track">
          <div id="ad-progress-bar" class="ad-progress-bar"></div>
        </div>
        <p id="ad-countdown" class="ad-countdown">广告播放中… 3s</p>
        <button type="button" id="btn-ad-close" class="btn-ad-close" disabled>请稍候</button>
      </div>
    </div>

    <!-- 额外词提示 -->
    <div id="extra-word-toast">+1 Extra Word</div>
  </div>

  <script src="js/progress.js?v=42"></script>
  <script src="js/start-screen.js?v=42"></script>
  <script src="js/vocabulary.js?v=42"></script>
  <script src="js/levels.js?v=42"></script>
  <script src="js/dictionary.js?v=42"></script>
  <script src="js/effects.js?v=42"></script>
  <script src="js/grid.js?v=42"></script>
  <script src="js/wheel.js?v=42"></script>
  <script src="js/validator.js?v=42"></script>
  <script src="js/ad-hint.js?v=42"></script>
  <script src="js/audio-haptic.js?v=42"></script>
  <script src="js/main.js?v=42"></script>
</body>
</html>
